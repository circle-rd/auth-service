<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Select organization</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:             #f4f4f5;
      --surface:        rgba(255,255,255,0.9);
      --surface-inner:  #f4f4f5;
      --surface-hover:  rgba(239,239,242,0.9);
      --border:         rgba(212,212,216,0.7);
      --border-focus:   #2563eb;
      --text:           #09090b;
      --text-muted:     #71717a;
      --text-subtle:    #a1a1aa;
      --primary:        #2563eb;
      --primary-hover:  #3b82f6;
      --primary-glow:   rgba(37,99,235,0.15);
      --danger:         #ef4444;
      --danger-bg:      rgba(239,68,68,0.08);
      --danger-border:  rgba(239,68,68,0.25);
      --radius-sm: 4px; --radius: 7px; --radius-lg: 9px; --radius-xl: 12px;
      --shadow-lg: 0 8px 24px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.04);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:             #09090b;
        --surface:        rgba(24,24,27,0.6);
        --surface-inner:  rgba(39,39,42,0.6);
        --surface-hover:  rgba(50,50,54,0.8);
        --border:         rgba(63,63,70,0.4);
        --border-focus:   #3b82f6;
        --text:           #fafafa;
        --text-muted:     #a1a1aa;
        --text-subtle:    #52525b;
        --primary:        #2563eb;
        --primary-hover:  #3b82f6;
        --primary-glow:   rgba(59,130,246,0.12);
        --danger:         #f87171;
        --danger-bg:      rgba(239,68,68,0.1);
        --danger-border:  rgba(239,68,68,0.3);
        --shadow-lg: 0 8px 32px rgba(0,0,0,.4), 0 2px 8px rgba(0,0,0,.3);
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100svh; display: flex; align-items: center; justify-content: center;
      padding: 1.5rem 1rem; -webkit-font-smoothing: antialiased;
    }
    .auth-container { width: 100%; max-width: 22rem; display: flex; flex-direction: column; align-items: center; }
    .auth-header { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; margin-bottom: 1.75rem; text-align: center; }
    .auth-icon {
      width: 3rem; height: 3rem; border-radius: var(--radius-xl);
      background: var(--primary); color: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 20px rgba(37,99,235,0.35); margin-bottom: 0.25rem;
    }
    .auth-icon svg { width: 1.375rem; height: 1.375rem; }
    h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
    .subtitle { font-size: 0.875rem; color: var(--text-muted); line-height: 1.5; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 1rem; width: 100%;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .error-box {
      background: var(--danger-bg); color: var(--danger);
      border: 1px solid var(--danger-border); border-radius: var(--radius-sm);
      padding: 0.5625rem 0.75rem; font-size: 0.875rem; margin-bottom: 0.75rem; display: none;
    }
    .org-list { display: flex; flex-direction: column; gap: 0.375rem; }
    .org-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.625rem 0.75rem; border-radius: var(--radius-lg);
      border: 1px solid transparent; cursor: pointer;
      transition: background .15s, border-color .15s;
      background: transparent; width: 100%; text-align: left; font-family: inherit;
      color: var(--text);
    }
    .org-item:hover:not(:disabled) { background: var(--surface-hover); border-color: var(--border); }
    .org-item:disabled { opacity: .5; cursor: not-allowed; }
    .org-avatar {
      width: 2.25rem; height: 2.25rem; border-radius: var(--radius);
      background: var(--primary); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.875rem; font-weight: 600; flex-shrink: 0;
      overflow: hidden;
    }
    .org-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .org-info { flex: 1; min-width: 0; }
    .org-name { font-size: 0.9375rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .org-slug { font-size: 0.8125rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chevron { color: var(--text-subtle); flex-shrink: 0; }
    .chevron svg { width: 1rem; height: 1rem; }
    .loading-spinner {
      width: 1rem; height: 1rem; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .6s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <div class="auth-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="16" height="20" x="2" y="2" rx="2" ry="2"/>
          <line x1="9" y1="22" x2="9" y2="2"/>
          <path d="M18 6 6 6M18 10l-6 0M18 14h-3"/>
        </svg>
      </div>
      <h1>Select organization</h1>
      <p class="subtitle">Choose the organization you want to continue with.</p>
    </div>

    <div class="card">
      <div class="error-box" id="error-box"></div>
      <div class="org-list" id="org-list"></div>
    </div>
  </div>

  <script type="module">
    const AUTH_URL = '{{AUTH_URL}}';
    const OAUTH_QUERY = '{{OAUTH_QUERY}}';
    const errorBox = document.getElementById('error-box');
    const orgList = document.getElementById('org-list');

    const orgs = (() => { try { return JSON.parse('{{ORGANIZATIONS_JSON}}'); } catch { return []; } })();

    function getInitials(name) {
      return name.split(/\s+/).slice(0, 2).map(w => w[0]).join('').toUpperCase();
    }

    function setAllDisabled(disabled) {
      orgList.querySelectorAll('.org-item').forEach(b => { b.disabled = disabled; });
    }

    orgs.forEach(org => {
      const btn = document.createElement('button');
      btn.className = 'org-item'; btn.type = 'button';

      const avatarDiv = document.createElement('div');
      avatarDiv.className = 'org-avatar';
      if (org.logo) {
        const img = document.createElement('img');
        img.src = org.logo; img.alt = org.name;
        img.onerror = () => { img.replaceWith(document.createTextNode(getInitials(org.name))); };
        avatarDiv.appendChild(img);
      } else {
        avatarDiv.textContent = getInitials(org.name);
      }

      const infoDiv = document.createElement('div');
      infoDiv.className = 'org-info';
      infoDiv.innerHTML = `<div class="org-name">${org.name}</div><div class="org-slug">${org.slug}</div>`;

      const chevron = document.createElement('div');
      chevron.className = 'chevron';
      chevron.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>';

      const spinner = document.createElement('div');
      spinner.className = 'loading-spinner'; spinner.setAttribute('aria-hidden', 'true');

      btn.appendChild(avatarDiv);
      btn.appendChild(infoDiv);
      btn.appendChild(chevron);
      btn.appendChild(spinner);

      btn.addEventListener('click', async () => {
        errorBox.style.display = 'none';
        setAllDisabled(true);
        chevron.style.display = 'none'; spinner.style.display = 'block';
        try {
          const setRes = await fetch(`${AUTH_URL}/api/auth/organization/set-active`, {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json', 'Origin': window.location.origin },
            body: JSON.stringify({ organizationId: org.id }),
          });
          if (!setRes.ok) {
            const d = await setRes.json().catch(() => ({}));
            throw new Error(d?.error?.message ?? 'Failed to select organization.');
          }
          const contRes = await fetch(`${AUTH_URL}/api/auth/oauth2/continue?${OAUTH_QUERY}`, {
            method: 'GET', credentials: 'include',
            headers: { 'Origin': window.location.origin },
            redirect: 'manual',
          });
          if (contRes.type === 'opaqueredirect') {
            window.location.href = `${AUTH_URL}/api/auth/oauth2/continue?${OAUTH_QUERY}`; return;
          }
          const cd = await contRes.json().catch(() => ({}));
          if (!contRes.ok) throw new Error(cd?.error?.message ?? 'Authorization failed.');
          window.location.href = cd.url ?? `${AUTH_URL}/api/auth/oauth2/continue?${OAUTH_QUERY}`;
        } catch(err) {
          errorBox.textContent = err.message;
          errorBox.style.display = 'block';
          setAllDisabled(false);
          chevron.style.display = ''; spinner.style.display = 'none';
        }
      });

      orgList.appendChild(btn);
    });
  </script>
</body>
</html>
