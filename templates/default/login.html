<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:             #f4f4f5;
      --surface:        rgba(255,255,255,0.9);
      --surface-inner:  #f4f4f5;
      --border:         rgba(212,212,216,0.7);
      --border-focus:   #2563eb;
      --text:           #09090b;
      --text-muted:     #71717a;
      --text-subtle:    #a1a1aa;
      --primary:        #2563eb;
      --primary-hover:  #3b82f6;
      --primary-glow:   rgba(37,99,235,0.15);
      --danger:         #ef4444;
      --danger-bg:      rgba(239,68,68,0.08);
      --danger-border:  rgba(239,68,68,0.25);
      --radius-sm: 4px; --radius: 7px; --radius-lg: 9px; --radius-xl: 12px;
      --shadow-lg: 0 8px 24px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.04);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:             #09090b;
        --surface:        rgba(24,24,27,0.6);
        --surface-inner:  rgba(39,39,42,0.6);
        --border:         rgba(63,63,70,0.4);
        --border-focus:   #3b82f6;
        --text:           #fafafa;
        --text-muted:     #a1a1aa;
        --text-subtle:    #52525b;
        --primary:        #2563eb;
        --primary-hover:  #3b82f6;
        --primary-glow:   rgba(59,130,246,0.12);
        --danger:         #f87171;
        --danger-bg:      rgba(239,68,68,0.1);
        --danger-border:  rgba(239,68,68,0.3);
        --shadow-lg: 0 8px 32px rgba(0,0,0,.4), 0 2px 8px rgba(0,0,0,.3);
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100svh;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem 1rem;
      -webkit-font-smoothing: antialiased;
    }
    .auth-container { width: 100%; max-width: 22rem; display: flex; flex-direction: column; align-items: center; }
    .auth-header { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; margin-bottom: 1.75rem; text-align: center; }
    .auth-icon {
      width: 3rem; height: 3rem; border-radius: var(--radius-xl);
      background: var(--primary); color: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 20px rgba(37,99,235,0.35); margin-bottom: 0.25rem;
    }
    .auth-icon svg { width: 1.375rem; height: 1.375rem; }
    h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
    .subtitle { font-size: 0.875rem; color: var(--text-muted); line-height: 1.5; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 1.5rem; width: 100%;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .form-group { margin-bottom: 1rem; }
    label {
      display: block; font-size: 0.8125rem; font-weight: 500;
      color: var(--text-muted); margin-bottom: 0.375rem;
    }
    .label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.375rem; }
    .label-row label { margin-bottom: 0; }
    .label-link { font-size: 0.8125rem; color: var(--primary); text-decoration: none; font-weight: 500; }
    .label-link:hover { color: var(--primary-hover); }
    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%; padding: 0.5625rem 0.75rem;
      border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 0.9375rem; font-family: inherit;
      color: var(--text); background: var(--surface-inner);
      outline: none; transition: border-color .15s, box-shadow .15s; line-height: 1.5;
    }
    input::placeholder { color: var(--text-subtle); }
    input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--primary-glow); }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      width: 100%; padding: 0.5625rem 1rem; border-radius: var(--radius);
      font-size: 0.9375rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: background .15s, box-shadow .15s, opacity .15s;
      border: 1px solid transparent; line-height: 1.5; margin-top: 1.25rem;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-box {
      background: var(--danger-bg); color: var(--danger);
      border: 1px solid var(--danger-border); border-radius: var(--radius-sm);
      padding: 0.5625rem 0.75rem; font-size: 0.875rem; margin-bottom: 1rem;
    }
    .error-box:empty { display: none; }
    .auth-footer { margin-top: 1.25rem; text-align: center; font-size: 0.875rem; color: var(--text-muted); }
    .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 500; }
    .auth-footer a:hover { color: var(--primary-hover); }
    .divider {
      display: flex; align-items: center; gap: .75rem;
      margin: 1.25rem 0 1rem; color: var(--text-subtle); font-size: .8125rem;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .social-buttons { display: flex; flex-direction: column; gap: .5rem; }
    .btn-social {
      display: flex; align-items: center; gap: .625rem; width: 100%;
      padding: .5rem .75rem; background: var(--surface-inner);
      border: 1px solid var(--border); border-radius: var(--radius);
      font-family: inherit; font-size: .9375rem; font-weight: 500;
      color: var(--text); cursor: pointer; transition: border-color .15s; line-height: 1.5;
    }
    .btn-social:hover:not(:disabled) { border-color: var(--border-focus); }
    .btn-social:disabled { opacity: .5; cursor: not-allowed; }
    .btn-social svg { flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <div class="auth-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your account to continue.</p>
    </div>

    <div class="card">
      <div class="error-box" id="error-box">{{ERROR_MESSAGE}}</div>
      <form id="login-form">
        <input type="hidden" name="redirectTo" value="{{REDIRECT_TO}}" />
        <input type="hidden" name="oauthQuery"  value="{{OAUTH_QUERY}}" />
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <div class="label-row">
            <label for="password">Password</label>
            <a class="label-link" href="/forgot-password">Forgot password?</a>
          </div>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn">Sign in</button>
      </form>
      <div id="social-section"></div>
    </div>

    <p class="auth-footer" id="register-footer">
      No account yet? <a id="register-link" href="{{REGISTER_URL}}">Create one</a>
    </p>
  </div>

  <script type="module">
    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('error-box');
    const submitBtn = document.getElementById('submit-btn');
    const AUTH_URL = '{{AUTH_URL}}';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';
      const email = form.email.value.trim();
      const password = form.password.value;
      const redirectTo = form.redirectTo.value || '/';
      const oauthQuery = form.oauthQuery.value;
      try {
        const body = { email, password, callbackURL: redirectTo };
        if (oauthQuery) body.oauth_query = oauthQuery;
        const res = await fetch(`${AUTH_URL}/api/auth/sign-in/email`, {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json', 'Origin': window.location.origin },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) { errorBox.textContent = data?.error?.message ?? 'Authentication failed.'; return; }
        if (data?.url) { window.location.href = data.url; }
        else if (redirectTo.startsWith('/api/') || redirectTo.startsWith('http')) { window.location.href = redirectTo; }
        else { window.location.href = redirectTo || '/'; }
      } catch { errorBox.textContent = 'A network error occurred. Please try again.'; }
      finally { submitBtn.disabled = false; submitBtn.textContent = 'Sign in'; }
    });

    if ('{{ALLOW_REGISTER}}' !== 'true') document.getElementById('register-footer')?.remove();

    const PROVIDER_CONFIG = {
      google:    { label: 'Continue with Google',    icon: '<svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>' },
      github:    { label: 'Continue with GitHub',    icon: '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>' },
      linkedin:  { label: 'Continue with LinkedIn',  icon: '<svg width="16" height="16" viewBox="0 0 24 24" fill="#0A66C2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>' },
      microsoft: { label: 'Continue with Microsoft', icon: '<svg width="16" height="16" viewBox="0 0 24 24"><path fill="#F25022" d="M1 1h10v10H1z"/><path fill="#00A4EF" d="M13 1h10v10H13z"/><path fill="#7FBA00" d="M1 13h10v10H1z"/><path fill="#FFB900" d="M13 13h10v10H13z"/></svg>' },
      apple:     { label: 'Continue with Apple',     icon: '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>' },
    };
    const socialProviders = (() => { try { return JSON.parse('{{SOCIAL_PROVIDERS_JSON}}'); } catch { return []; } })();
    if (socialProviders.length > 0) {
      const sec = document.getElementById('social-section');
      sec.innerHTML = '<div class="divider"><span>or continue with</span></div><div class="social-buttons" id="social-buttons"></div>';
      const container = document.getElementById('social-buttons');
      socialProviders.forEach(provider => {
        const cfg = PROVIDER_CONFIG[provider]; if (!cfg) return;
        const btn = document.createElement('button');
        btn.type = 'button'; btn.className = 'btn-social'; btn.dataset.provider = provider;
        btn.innerHTML = cfg.icon + '<span>' + cfg.label + '</span>';
        btn.addEventListener('click', async () => {
          container.querySelectorAll('.btn-social').forEach(b => { b.disabled = true; });
          btn.innerHTML = cfg.icon + '<span>Redirecting…</span>';
          const oq = form.oauthQuery.value; const rd = form.redirectTo.value || '/';
          const callbackURL = oq ? AUTH_URL + '/api/auth/oauth2/authorize?' + oq : rd;
          try {
            const res = await fetch(`${AUTH_URL}/api/auth/sign-in/social`, {
              method: 'POST', credentials: 'include',
              headers: { 'Content-Type': 'application/json', 'Origin': window.location.origin },
              body: JSON.stringify({ provider, callbackURL }),
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok || !data.url) {
              errorBox.textContent = data?.error?.message ?? 'Social sign-in failed.';
              container.querySelectorAll('.btn-social').forEach(b => { b.disabled = false; });
              btn.innerHTML = cfg.icon + '<span>' + cfg.label + '</span>'; return;
            }
            window.location.href = data.url;
          } catch {
            errorBox.textContent = 'A network error occurred. Please try again.';
            container.querySelectorAll('.btn-social').forEach(b => { b.disabled = false; });
            btn.innerHTML = cfg.icon + '<span>' + cfg.label + '</span>';
          }
        });
        container.appendChild(btn);
      });
    }
  </script>
</body>
</html>
