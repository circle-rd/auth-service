<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Select Organization</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .08);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    h1 { font-size: 1.5rem; font-weight: 700; color: #111; margin-bottom: .25rem; }
    .subtitle { color: #6b7280; font-size: .875rem; margin-bottom: 2rem; }

    .org-list { display: flex; flex-direction: column; gap: .75rem; }

    .org-btn {
      display: flex;
      align-items: center;
      gap: .875rem;
      width: 100%;
      padding: .875rem 1rem;
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      transition: border-color .15s, background .15s;
      font-size: .95rem;
      color: #111;
    }
    .org-btn:hover { border-color: #4f46e5; background: #f5f3ff; }
    .org-btn:disabled { opacity: .5; cursor: not-allowed; }
    .org-btn:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.15); }

    .org-avatar {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 8px;
      background: #e0e7ff;
      color: #4f46e5;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 1rem;
      flex-shrink: 0;
      overflow: hidden;
    }
    .org-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .org-name { font-weight: 600; }
    .org-slug { font-size: .8rem; color: #6b7280; }

    .chevron { margin-left: auto; color: #9ca3af; flex-shrink: 0; }

    .error-banner {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      border-radius: 8px;
      padding: .75rem 1rem;
      font-size: .875rem;
      margin-bottom: 1.25rem;
    }
    .error-banner.visible { display: block; }

    .loading {
      display: none;
      text-align: center;
      color: #6b7280;
      font-size: .875rem;
      margin-top: 1rem;
    }
    .loading.visible { display: block; }

    @media (prefers-color-scheme: dark) {
      body { background: #111827; }
      .card { background: #1f2937; box-shadow: 0 4px 16px rgba(0,0,0,.3); }
      h1 { color: #f9fafb; }
      .subtitle, .org-slug, .chevron { color: #9ca3af; }
      .org-btn { background: #1f2937; border-color: #374151; color: #f3f4f6; }
      .org-btn:hover { border-color: #818cf8; background: #312e81; }
      .org-avatar { background: #312e81; color: #818cf8; }
      .error-banner { background: #450a0a; border-color: #991b1b; color: #fca5a5; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Select Organization</h1>
    <p class="subtitle">Choose the organization you want to work in.</p>

    <div class="error-banner" id="error"></div>

    <div class="org-list" id="org-list">
      <!-- Injected by server -->
    </div>

    <p class="loading" id="loading">Redirecting…</p>
  </div>

  <script>
    (function () {
      const AUTH_URL = "{{AUTH_URL}}";
      const OAUTH_QUERY = "{{OAUTH_QUERY}}";
      /** @type {Array<{id: string, name: string, slug: string, logo?: string}>} */
      const ORGANIZATIONS = JSON.parse("{{ORGANIZATIONS_JSON}}");

      const listEl = document.getElementById("org-list");
      const errorEl = document.getElementById("error");
      const loadingEl = document.getElementById("loading");

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.add("visible");
        loadingEl.classList.remove("visible");
        document.querySelectorAll(".org-btn").forEach(b => b.disabled = false);
      }

      function initials(name) {
        return name.split(/\s+/).slice(0, 2).map(w => w[0]).join("").toUpperCase();
      }

      async function selectOrg(orgId) {
        document.querySelectorAll(".org-btn").forEach(b => b.disabled = true);
        errorEl.classList.remove("visible");
        loadingEl.classList.add("visible");

        try {
          // 1. Set the org as active in the BetterAuth session
          const setRes = await fetch(AUTH_URL + "/api/auth/organization/set-active", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ organizationId: orgId }),
          });
          if (!setRes.ok) {
            const data = await setRes.json().catch(() => ({}));
            throw new Error(data?.message || "Failed to set active organization.");
          }

          // 2. Continue the OAuth2 post-login flow
          const continueRes = await fetch(AUTH_URL + "/api/auth/oauth2/continue", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              ...(OAUTH_QUERY ? { "x-oauth-query": OAUTH_QUERY } : {}),
            },
            credentials: "include",
            body: JSON.stringify({ postLogin: true, ...(OAUTH_QUERY ? { oauth_query: OAUTH_QUERY } : {}) }),
          });

          if (!continueRes.ok) {
            const data = await continueRes.json().catch(() => ({}));
            throw new Error(data?.message || "Failed to continue authorization.");
          }

          const result = await continueRes.json();
          if (result?.url) {
            window.location.href = result.url;
          } else {
            throw new Error("No redirect URL returned.");
          }
        } catch (err) {
          showError(err.message || "An unexpected error occurred.");
        }
      }

      // Build org buttons
      if (ORGANIZATIONS.length === 0) {
        listEl.innerHTML = "<p style='color:#6b7280;font-size:.875rem;text-align:center'>No organizations found.</p>";
      } else {
        for (const org of ORGANIZATIONS) {
          const btn = document.createElement("button");
          btn.className = "org-btn";
          btn.type = "button";

          const avatar = document.createElement("div");
          avatar.className = "org-avatar";
          if (org.logo) {
            const img = document.createElement("img");
            img.src = org.logo;
            img.alt = org.name;
            avatar.appendChild(img);
          } else {
            avatar.textContent = initials(org.name);
          }

          const info = document.createElement("div");
          info.innerHTML = `<div class="org-name">${org.name}</div><div class="org-slug">${org.slug}</div>`;

          const chevron = document.createElement("span");
          chevron.className = "chevron";
          chevron.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>`;

          btn.appendChild(avatar);
          btn.appendChild(info);
          btn.appendChild(chevron);
          btn.addEventListener("click", () => selectOrg(org.id));
          listEl.appendChild(btn);
        }
      }
    })();
  </script>
</body>
</html>
