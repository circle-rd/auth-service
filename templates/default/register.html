<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --border-focus: #2563eb;
      --text: #0f172a;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-light: #eff6ff;
      --primary-border: #bfdbfe;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --danger-border: #fecaca;
      --shadow-lg: 0 10px 24px -3px rgba(0,0,0,.1), 0 4px 8px -2px rgba(0,0,0,.05);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #080808;
        --surface: #111111;
        --border: rgba(255,255,255,.07);
        --border-focus: #3b82f6;
        --text: #f1f5f9;
        --text-muted: #94a3b8;
        --text-light: #505050;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --primary-light: rgba(59,130,246,.1);
        --primary-border: rgba(59,130,246,.3);
        --danger: #f87171;
        --danger-bg: rgba(239,68,68,.1);
        --danger-border: rgba(239,68,68,.3);
        --shadow-lg: 0 10px 24px rgba(0,0,0,.4);
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
      -webkit-font-smoothing: antialiased;
    }

    .auth-container {
      width: 100%;
      max-width: 24rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .auth-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.75rem;
      text-align: center;
    }

    .auth-icon {
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 50%;
      background: var(--primary-light);
      border: 1px solid var(--primary-border);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-icon svg { width: 1.25rem; height: 1.25rem; }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      box-shadow: var(--shadow-lg);
    }

    .form-group { margin-bottom: 1.25rem; }
    .form-group:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.375rem;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 0.5625rem 0.875rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.9375rem;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      line-height: 1.5;
    }
    input::placeholder { color: var(--text-light); }
    input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.625rem 1rem;
      border-radius: 6px;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      border: 1px solid transparent;
      line-height: 1.5;
      margin-top: 1.25rem;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

    .error-box {
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid var(--danger-border);
      border-radius: 8px;
      padding: 0.625rem 0.875rem;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      display: none;
    }

    .auth-footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 500; }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-container">

    <div class="auth-header">
      <div class="auth-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
          <line x1="12" y1="1" x2="12" y2="4"/>
          <line x1="10" y1="2.5" x2="14" y2="2.5"/>
        </svg>
      </div>
      <h1>Create your account</h1>
      <p class="subtitle">Fill in the details below to get started.</p>
    </div>

    <div class="card">
      <div class="error-box" id="error-box"></div>

      <form id="register-form">
        <input type="hidden" name="redirectTo" value="{{REDIRECT_TO}}" />
        <input type="hidden" name="oauthQuery" value="{{OAUTH_QUERY}}" />

        <div class="form-group">
          <label for="name">Full name</label>
          <input id="name" name="name" type="text" autocomplete="name"
                 placeholder="Jane Doe" required />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email"
                 placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password"
                 autocomplete="new-password" placeholder="At least 8 characters"
                 required minlength="8" />
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">Create account</button>
      </form>
    </div>

    <p class="auth-footer">
      Already have an account?
      <a href="/login?redirectTo={{REDIRECT_TO}}">Sign in</a>
    </p>

  </div>

  <script type="module">
    const form = document.getElementById('register-form');
    const errorBox = document.getElementById('error-box');
    const submitBtn = document.getElementById('submit-btn');
    const AUTH_URL = '{{AUTH_URL}}';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account…';

      const name     = form.name.value.trim();
      const email    = form.email.value.trim();
      const password = form.password.value;
      const redirectTo = form.redirectTo.value || '/';
      const oauthQuery = form.oauthQuery.value;

      try {
        const body = { name, email, password, callbackURL: redirectTo };
        if (oauthQuery) body.oauth_query = oauthQuery;

        const res = await fetch(`${AUTH_URL}/api/auth/sign-up/email`, {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json', 'Origin': window.location.origin },
          body: JSON.stringify(body),
        });
        const data = await res.json();

        if (!res.ok) {
          errorBox.textContent = data?.error?.message ?? 'Registration failed.';
          errorBox.style.display = 'block';
          return;
        }

        if (data?.url) {
          window.location.href = data.url;
        } else if (redirectTo.startsWith('/api/') || redirectTo.startsWith('http')) {
          window.location.href = redirectTo;
        } else {
          window.location.href = redirectTo || '/';
        }
      } catch {
        errorBox.textContent = 'A network error occurred. Please try again.';
        errorBox.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
