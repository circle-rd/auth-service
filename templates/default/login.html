<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .08);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }

    h1 { font-size: 1.5rem; font-weight: 700; color: #111; margin-bottom: .25rem; }
    .subtitle { color: #6b7280; font-size: .875rem; margin-bottom: 2rem; }

    label { display: block; font-size: .875rem; font-weight: 500; color: #374151; margin-bottom: .35rem; }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: .625rem .875rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: .95rem;
      color: #111;
      outline: none;
      transition: border-color .15s;
      margin-bottom: 1rem;
    }
    input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.15); }

    button[type="submit"] {
      width: 100%;
      padding: .7rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      margin-top: .25rem;
    }
    button[type="submit"]:hover { background: #4338ca; }

    .error {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: .6rem .875rem;
      font-size: .875rem;
      margin-bottom: 1rem;
    }

    .footer {
      text-align: center;
      font-size: .875rem;
      color: #6b7280;
      margin-top: 1.5rem;
    }
    .footer a { color: #4f46e5; text-decoration: none; font-weight: 500; }
    .footer a:hover { text-decoration: underline; }

    .forgot { display: block; text-align: right; font-size: .8125rem; color: #4f46e5;
              text-decoration: none; margin-top: -.5rem; margin-bottom: 1rem; }
    .forgot:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign in</h1>
    <p class="subtitle">Welcome back — enter your credentials to continue.</p>

    {{#if ERROR_MESSAGE}}
    <div class="error" id="error-box">{{ERROR_MESSAGE}}</div>
    {{/if}}
    <div class="error" id="error-box" style="display:none"></div>

    <form id="login-form">
      <input type="hidden" name="redirectTo" value="{{REDIRECT_TO}}" />
      <input type="hidden" name="oauthQuery" value="{{OAUTH_QUERY}}" />

      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email"
             placeholder="you@example.com" required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password"
             autocomplete="current-password" placeholder="••••••••" required />

      <a class="forgot" href="/forgot-password">Forgot password?</a>

      <button type="submit">Sign in</button>
    </form>

    <p class="footer">
      No account yet?
      <a href="/register?redirectTo={{REDIRECT_TO}}">Create one</a>
    </p>
  </div>

  <script type="module">
    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('error-box');
    const AUTH_URL = '{{AUTH_URL}}';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';

      const email    = form.email.value.trim();
      const password = form.password.value;
      const redirectTo = form.redirectTo.value || '/';
      const oauthQuery = form.oauthQuery.value;

      try {
        const body = { email, password, callbackURL: redirectTo };
        if (oauthQuery) body.oauth_query = oauthQuery;

        const res = await fetch(`${AUTH_URL}/api/auth/sign-in/email`, {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json',
                     'Origin': window.location.origin },
          body: JSON.stringify(body),
        });
        const data = await res.json();

        if (!res.ok) {
          errorBox.textContent = data?.error?.message ?? 'Authentication failed.';
          errorBox.style.display = 'block';
          return;
        }

        // BetterAuth may return a redirect URL directly
        if (data?.url) {
          window.location.href = data.url;
        } else if (redirectTo.startsWith('/api/') || redirectTo.startsWith('http')) {
          window.location.href = redirectTo;
        } else {
          window.location.href = redirectTo || '/';
        }
      } catch {
        errorBox.textContent = 'A network error occurred. Please try again.';
        errorBox.style.display = 'block';
      }
    });
  </script>
</body>
</html>
