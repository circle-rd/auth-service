<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Select Organization</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-hover: #f8fafc;
      --border: #e2e8f0;
      --border-hover: #cbd5e1;
      --text: #0f172a;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-light: #eff6ff;
      --primary-border: #bfdbfe;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --danger-border: #fecaca;
      --shadow-lg: 0 10px 24px -3px rgba(0,0,0,.1), 0 4px 8px -2px rgba(0,0,0,.05);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #080808;
        --surface: #111111;
        --surface-hover: #1a1a1a;
        --border: rgba(255,255,255,.07);
        --border-hover: rgba(255,255,255,.13);
        --text: #f1f5f9;
        --text-muted: #94a3b8;
        --text-light: #505050;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --primary-light: rgba(59,130,246,.1);
        --primary-border: rgba(59,130,246,.3);
        --danger: #f87171;
        --danger-bg: rgba(239,68,68,.1);
        --danger-border: rgba(239,68,68,.3);
        --shadow-lg: 0 10px 24px rgba(0,0,0,.4);
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
      -webkit-font-smoothing: antialiased;
    }

    .auth-container {
      width: 100%;
      max-width: 26rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ───────────── */
    .auth-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.75rem;
      text-align: center;
    }

    .auth-icon {
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 50%;
      background: var(--primary-light);
      border: 1px solid var(--primary-border);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-icon svg { width: 1.25rem; height: 1.25rem; }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    /* ── Card ─────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    /* ── Error banner ─────── */
    .error-banner {
      background: var(--danger-bg);
      border: 1px solid var(--danger-border);
      color: var(--danger);
      border-radius: 8px;
      padding: 0.625rem 0.875rem;
      font-size: 0.875rem;
      display: none;
    }
    .error-banner.visible { display: block; }

    /* ── Org button ───────── */
    .org-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .org-btn {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      width: 100%;
      padding: 0.75rem 0.875rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      transition: border-color .15s, background .15s;
      font-family: inherit;
      color: var(--text);
    }
    .org-btn:hover { border-color: var(--primary); background: var(--primary-light); }
    .org-btn:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
    .org-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .org-avatar {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 8px;
      background: var(--primary-light);
      border: 1px solid var(--primary-border);
      color: var(--primary);
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 0.9375rem;
      flex-shrink: 0;
      overflow: hidden;
    }
    .org-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .org-info { flex: 1; min-width: 0; }
    .org-name { font-weight: 600; font-size: 0.9375rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .org-slug { font-size: 0.8125rem; color: var(--text-muted); margin-top: 0.125rem; }

    .chevron { margin-left: auto; color: var(--text-light); flex-shrink: 0; }

    .empty-state {
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-muted);
      padding: 1rem 0;
    }

    .loading {
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 0.75rem;
      display: none;
    }
    .loading.visible { display: block; }
  </style>
</head>
<body>
  <div class="auth-container">

    <div class="auth-header">
      <div class="auth-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <h1>Select Organization</h1>
      <p class="subtitle">Choose the organization you want to work in.</p>
    </div>

    <div class="card">
      <div class="error-banner" id="error"></div>
      <div class="org-list" id="org-list"></div>
    </div>

    <p class="loading" id="loading">Redirecting…</p>

  </div>

  <script>
    (function () {
      const AUTH_URL = "{{AUTH_URL}}";
      const OAUTH_QUERY = "{{OAUTH_QUERY}}";
      /** @type {Array<{id: string, name: string, slug: string, logo?: string}>} */
      const ORGANIZATIONS = JSON.parse("{{ORGANIZATIONS_JSON}}");

      const listEl = document.getElementById("org-list");
      const errorEl = document.getElementById("error");
      const loadingEl = document.getElementById("loading");

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.add("visible");
        loadingEl.classList.remove("visible");
        document.querySelectorAll(".org-btn").forEach(b => b.disabled = false);
      }

      function initials(name) {
        return name.split(/\s+/).slice(0, 2).map(w => w[0]).join("").toUpperCase();
      }

      async function selectOrg(orgId) {
        document.querySelectorAll(".org-btn").forEach(b => b.disabled = true);
        errorEl.classList.remove("visible");
        loadingEl.classList.add("visible");

        try {
          const setRes = await fetch(AUTH_URL + "/api/auth/organization/set-active", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ organizationId: orgId }),
          });
          if (!setRes.ok) {
            const data = await setRes.json().catch(() => ({}));
            throw new Error(data?.message || "Failed to set active organization.");
          }

          const continueRes = await fetch(AUTH_URL + "/api/auth/oauth2/continue", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              ...(OAUTH_QUERY ? { "x-oauth-query": OAUTH_QUERY } : {}),
            },
            credentials: "include",
            body: JSON.stringify({ postLogin: true, ...(OAUTH_QUERY ? { oauth_query: OAUTH_QUERY } : {}) }),
          });

          if (!continueRes.ok) {
            const data = await continueRes.json().catch(() => ({}));
            throw new Error(data?.message || "Failed to continue authorization.");
          }

          const result = await continueRes.json();
          if (result?.url) {
            window.location.href = result.url;
          } else {
            throw new Error("No redirect URL returned.");
          }
        } catch (err) {
          showError(err.message || "An unexpected error occurred.");
        }
      }

      if (ORGANIZATIONS.length === 0) {
        listEl.innerHTML = "<p class='empty-state'>No organizations found.</p>";
      } else {
        for (const org of ORGANIZATIONS) {
          const btn = document.createElement("button");
          btn.className = "org-btn";
          btn.type = "button";

          const avatar = document.createElement("div");
          avatar.className = "org-avatar";
          if (org.logo) {
            const img = document.createElement("img");
            img.src = org.logo;
            img.alt = org.name;
            avatar.appendChild(img);
          } else {
            avatar.textContent = initials(org.name);
          }

          const info = document.createElement("div");
          info.className = "org-info";
          info.innerHTML = `<div class="org-name">${org.name}</div><div class="org-slug">${org.slug}</div>`;

          const chevron = document.createElement("span");
          chevron.className = "chevron";
          chevron.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>`;

          btn.appendChild(avatar);
          btn.appendChild(info);
          btn.appendChild(chevron);
          btn.addEventListener("click", () => selectOrg(org.id));
          listEl.appendChild(btn);
        }
      }
    })();
  </script>
</body>
</html>
