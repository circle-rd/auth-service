<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Verify your email</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:             #f4f4f5;
      --surface:        rgba(255,255,255,0.9);
      --surface-inner:  #f4f4f5;
      --border:         rgba(212,212,216,0.7);
      --border-focus:   #2563eb;
      --text:           #09090b;
      --text-muted:     #71717a;
      --text-subtle:    #a1a1aa;
      --primary:        #2563eb;
      --primary-hover:  #3b82f6;
      --primary-glow:   rgba(37,99,235,0.15);
      --danger:         #ef4444;
      --danger-bg:      rgba(239,68,68,0.08);
      --danger-border:  rgba(239,68,68,0.25);
      --success:        #22c55e;
      --success-bg:     rgba(34,197,94,0.08);
      --success-border: rgba(34,197,94,0.25);
      --radius-sm: 4px; --radius: 7px; --radius-lg: 9px; --radius-xl: 12px;
      --shadow-lg: 0 8px 24px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.04);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:             #09090b;
        --surface:        rgba(24,24,27,0.6);
        --surface-inner:  rgba(39,39,42,0.6);
        --border:         rgba(63,63,70,0.4);
        --border-focus:   #3b82f6;
        --text:           #fafafa;
        --text-muted:     #a1a1aa;
        --text-subtle:    #52525b;
        --primary:        #2563eb;
        --primary-hover:  #3b82f6;
        --primary-glow:   rgba(59,130,246,0.12);
        --danger:         #f87171;
        --danger-bg:      rgba(239,68,68,0.1);
        --danger-border:  rgba(239,68,68,0.3);
        --success:        #4ade80;
        --success-bg:     rgba(34,197,94,0.1);
        --success-border: rgba(34,197,94,0.3);
        --shadow-lg: 0 8px 32px rgba(0,0,0,.4), 0 2px 8px rgba(0,0,0,.3);
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100svh; display: flex; align-items: center; justify-content: center;
      padding: 1.5rem 1rem; -webkit-font-smoothing: antialiased;
    }
    .auth-container { width: 100%; max-width: 22rem; display: flex; flex-direction: column; align-items: center; }
    .auth-header { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; margin-bottom: 1.75rem; text-align: center; }
    .auth-icon {
      width: 3rem; height: 3rem; border-radius: var(--radius-xl);
      background: var(--primary); color: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 20px rgba(37,99,235,0.35); margin-bottom: 0.25rem;
    }
    .auth-icon svg { width: 1.375rem; height: 1.375rem; }
    h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
    .subtitle { font-size: 0.875rem; color: var(--text-muted); line-height: 1.5; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 1.5rem; width: 100%;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      text-align: center;
    }
    .card p { font-size: 0.875rem; color: var(--text-muted); line-height: 1.6; }
    .status-box {
      border-radius: var(--radius-sm); padding: 0.5625rem 0.75rem;
      font-size: 0.875rem; margin-bottom: 1rem; display: none;
    }
    .status-box.error { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger-border); }
    .status-box.success { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      width: 100%; padding: 0.5625rem 1rem; border-radius: var(--radius);
      font-size: 0.9375rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: background .15s, box-shadow .15s, opacity .15s;
      border: 1px solid transparent; line-height: 1.5; margin-top: 1.25rem;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .cooldown-note { margin-top: 0.75rem; font-size: 0.8125rem; color: var(--text-subtle); display: none; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <div class="auth-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="20" height="16" x="2" y="4" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
      </div>
      <h1>Check your inbox</h1>
      <p class="subtitle">We've sent a verification link to your email address. Click it to activate your account.</p>
    </div>

    <div class="card">
      <div class="status-box" id="status-box"></div>
      <p>Didn't receive the email? Click below to resend the verification link.</p>
      <button type="button" class="btn btn-primary" id="resend-btn">Resend verification email</button>
      <p class="cooldown-note" id="cooldown-note"></p>
    </div>
  </div>

  <script type="module">
    const AUTH_URL = '{{AUTH_URL}}';
    const resendBtn = document.getElementById('resend-btn');
    const statusBox = document.getElementById('status-box');
    const cooldownNote = document.getElementById('cooldown-note');
    let cooldownTimer = null;

    function showStatus(type, message) {
      statusBox.className = 'status-box ' + type;
      statusBox.textContent = message;
      statusBox.style.display = 'block';
    }

    function startCooldown(seconds) {
      resendBtn.disabled = true;
      cooldownNote.style.display = 'block';
      let remaining = seconds;
      cooldownNote.textContent = `You can resend in ${remaining}s.`;
      clearInterval(cooldownTimer);
      cooldownTimer = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(cooldownTimer);
          resendBtn.disabled = false;
          cooldownNote.style.display = 'none';
        } else {
          cooldownNote.textContent = `You can resend in ${remaining}s.`;
        }
      }, 1000);
    }

    resendBtn.addEventListener('click', async () => {
      statusBox.style.display = 'none';
      resendBtn.disabled = true;
      resendBtn.textContent = 'Sending…';
      try {
        const res = await fetch(`${AUTH_URL}/api/auth/send-verification-email`, {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json', 'Origin': window.location.origin },
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showStatus('error', data?.error?.message ?? 'Failed to send email. Please try again.');
          resendBtn.disabled = false;
          resendBtn.textContent = 'Resend verification email';
          return;
        }
        showStatus('success', 'Verification email sent! Please check your inbox.');
        resendBtn.textContent = 'Resend verification email';
        startCooldown(30);
      } catch {
        showStatus('error', 'A network error occurred. Please try again.');
        resendBtn.disabled = false;
        resendBtn.textContent = 'Resend verification email';
      }
    });
  </script>
</body>
</html>
